<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Roadmap</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #EAEAF4, #CFCFE7);
}

/* HEADER */
.header {
  text-align: center;
  margin-top: 30px;
}

.header h1 {
  color: #4B4376;
}

/* ROAD CONTAINER */
.road {
  position: relative;
  width: 90%;
  margin: 50px auto;
}

/* SVG ROAD */
svg {
  width: 100%;
  height: auto;
}

/* PIN STYLE */
.pin {
  position: absolute;
  width: 30px;
  height: 30px;
  background: #E4B36D;
  border-radius: 50%;
  border: 3px solid #4B4376;
  cursor: pointer;
  transform: translate(-50%, -50%);
}

.pin:hover {
  transform: translate(-50%, -50%) scale(1.2);
}

/* Popup */
.popup {
  display: none;
  position: absolute;
  background: #4B4376;
  color: white;
  padding: 10px;
  border-radius: 10px;
  width: 150px;
  transform: translate(-50%, -120%);
}

/* POSITIONS (aligned to path visually) */
.p1 { top: 60%; left: 10%; }
.p2 { top: 35%; left: 30%; }
.p3 { top: 65%; left: 50%; }
.p4 { top: 30%; left: 70%; }
.p5 { top: 55%; left: 90%; }

/* GOAL */
.goal {
  text-align: center;
  font-size: 24px;
  color: #3A345B;
}
</style>

<script>
function toggle(id){
  document.querySelectorAll('.popup').forEach(p => p.style.display="none");
  document.getElementById(id).style.display="block";
}
</script>

</head>

<body>

<div class="header">
<h1>🚀 AI Solutions Architect Roadmap</h1>
</div>

<div class="road">

<!-- REAL ROAD -->
<svg viewBox="0 0 1000 400">

  <!-- ROAD BODY -->
  <path d="M50 300 
           C200 100, 300 400, 450 250 
           S700 100, 900 300"
        stroke="#222"
        stroke-width="50"
        fill="none"
        stroke-linecap="round"/>

  <!-- CENTER DASH LINE -->
  <path d="M50 300 
           C200 100, 300 400, 450 250 
           S700 100, 900 300"
        stroke="white"
        stroke-width="4"
        fill="none"
        stroke-dasharray="10,10"/>

</svg>

<!-- PINS -->
<div class="pin p1" onclick="toggle('t1')">
  <div class="popup" id="t1">Python Basics</div>
</div>

<div class="pin p2" onclick="toggle('t2')">
  <div class="popup" id="t2">Data Handling</div>
</div>

<div class="pin p3" onclick="toggle('t3')">
  <div class="popup" id="t3">Machine Learning</div>
</div>

<div class="pin p4" onclick="toggle('t4')">
  <div class="popup" id="t4">Deep Learning</div>
</div>

<div class="pin p5" onclick="toggle('t5')">
  <div class="popup" id="t5">Generative AI</div>
</div>

</div>

<div class="goal">
🎯 Final Goal → AI Solutions Architect
</div>

</body>
</html>
``
