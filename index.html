<!DOCTYPE html>
<html>
<head>
  <title>AI Roadmap</title>

  <!-- Animation library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .box {
      background: #1e293b;
      margin: 40px auto;
      padding: 20px;
      width: 60%;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .box:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>🚀 AI Solutions Architect Roadmap</h1>

<div class="box" data-aos="fade-up">
  <h2>Step 1: Python</h2>
  <p>Learn basics and programming</p>
</div>

<div class="box" data-aos="fade-left">
  <h2>Step 2: Machine Learning</h2>
  <p>Learn ML algorithms</p>
</div>

<div class="box" data-aos="fade-right">
  <h2>Step 3: Generative AI</h2>
  <p>Learn LLMs and Chatbots</p>
</div>

<!-- Animation script -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init();
</script>

</body>
</html>
