<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Roadmap</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #EAEAF4, #CFCFE7);
  text-align: center;
}

h1 {
  margin-top: 20px;
  color: #4B4376;
}

/* ROAD CONTAINER */
.road-container {
  position: relative;
  height: 700px;
  margin-top: 20px;
}

/* ROAD (3D LOOK) */
.road {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
}

/* PERSPECTIVE EFFECT */
svg {
  width: 400px;
  height: 700px;
}

/* ROAD MAIN */
.road-main {
  fill: none;
  stroke: #2F2E41;
  stroke-linecap: round;
}

/* CENTER LINE */
.road-line {
  fill: none;
  stroke: white;
  stroke-dasharray: 8,8;
}

/* PINS */
.pin {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
}

.pin-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 4px solid;
  background: white;
}

/* COLORS */
.c1 { border-color: #FFC107; }
.c2 { border-color: #FF5722; }
.c3 { border-color: #9C27B0; }
.c4 { border-color: #2196F3; }
.c5 { border-color: #4CAF50; }

/* LABEL */
.pin span {
  display: block;
  font-size: 12px;
  margin-top: 6px;
  color: #3A345B;
}

/* POSITION (aligned visually with perspective) */
.p1 { bottom: 40px; left: 50%; }
.p2 { bottom: 160px; left: 55%; }
.p3 { bottom: 300px; left: 45%; }
.p4 { bottom: 440px; left: 55%; }
.p5 { bottom: 580px; left: 50%; }

/* POPUP CARD */
.popup {
  display: none;
  position: absolute;
  background: #4B4376;
  color: white;
  padding: 12px;
  border-radius: 15px;
  width: 180px;
  transform: translate(-50%, -120%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* GOAL */
.goal {
  margin-top: 10px;
  font-size: 18px;
  color: #3A345B;
}
</style>

<script>
function openCard(id){
  document.querySelectorAll('.popup').forEach(p => p.style.display="none");
  document.getElementById(id).style.display="block";
}
</script>

</head>

<body>

<h1>🚀 AI Solutions Architect Roadmap</h1>

<div class="road-container">

<!-- ✅ 3D EFFECT ROAD -->
<svg viewBox="0 0 400 700">

  <!-- ROAD BODY (wide → narrow illusion using stroke-width gradient trick) -->
  <path class="road-main"
        d="M200 700 
           C150 600, 300 500, 200 400
           C120 300, 280 250, 200 150
           C180 100, 220 50, 200 10"
        stroke-width="60"/>

  <!-- CENTER LINE -->
  <path class="road-line"
        d="M200 700 
           C150 600, 300 500, 200 400
           C120 300, 280 250, 200 150
           C180 100, 220 50, 200 10"
        stroke-width="3"/>

</svg>

<!-- ✅ STEPS (BOTTOM → TOP) -->

<div class="pin p1" onclick="openCard('c1')">
  <div class="pin-dot c1"></div>
  <span>Python</span>
  <div id="c1" class="popup">
    Variables, loops<br>functions
  </div>
</div>

<div class="pin p2" onclick="openCard('c2')">
  <div class="pin-dot c2"></div>
  <span>Data</span>
  <div id="c2" class="popup">
    Numpy<br>Pandas
  </div>
</div>

<div class="pin p3" onclick="openCard('c3')">
  <div class="pin-dot c3"></div>
  <span>ML</span>
  <div id="c3" class="popup">
    Regression<br>Classification
  </div>
</div>

<div class="pin p4" onclick="openCard('c4')">
  <div class="pin-dot c4"></div>
  <span>DL</span>
  <div id="c4" class="popup">
    Neural networks<br>CNN
  </div>
</div>

<div class="pin p5" onclick="openCard('c5')">
  <div class="pin-dot c5"></div>
  <span>GenAI</span>
  <div id="c5" class="popup">
    LLMs, RAG
  </div>
</div>

</div>

<div class="goal">
🎯 Final → AI Solutions Architect
</div>

</body>
</html>
``
