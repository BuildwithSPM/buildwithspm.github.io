<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Roadmap</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #EAEAF4, #CFCFE7);
}

/* HEADER */
.header {
  text-align: center;
  margin-top: 30px;
}

.header h1 {
  color: #4B4376;
}

/* ROAD CONTAINER */
.road {
  position: relative;
  width: 85%;
  height: 450px;
  margin: 50px auto;
}

/* SVG ROAD PATH */
svg {
  width: 100%;
  height: 100%;
}

/* ROAD LINE */
.road path {
  stroke: #3A345B;
  stroke-width: 18;
  fill: none;
  stroke-linecap: round;
  stroke-dasharray: 12,10;
}

/* STOPS */
.stop {
  position: absolute;
  width: 32px;
  height: 32px;
  background: #E4B36D;
  border-radius: 50%;
  border: 4px solid #4B4376;
  cursor: pointer;
  transition: 0.3s;
}

.stop:hover {
  transform: scale(1.2);
}

/* STOP POSITIONS (aligned to road) */
.s1 { top: 70%; left: 8%; }
.s2 { top: 35%; left: 28%; }
.s3 { top: 65%; left: 48%; }
.s4 { top: 30%; left: 68%; }
.s5 { top: 55%; left: 88%; }

/* POPUP CARD */
.popup {
  display: none;
  position: absolute;
  background: #4B4376;
  color: white;
  padding: 15px;
  border-radius: 15px;
  width: 160px;
  top: -110px;
  left: -60px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* POPUP BUTTON */
.popup a {
  display: inline-block;
  margin-top: 10px;
  padding: 6px 12px;
  background: #E4B36D;
  border-radius: 10px;
  text-decoration: none;
  color: #222;
  font-weight: bold;
}

/* DESTINATION */
.goal {
  text-align: center;
  font-size: 26px;
  color: #3A345B;
  margin-top: 20px;
}
</style>

<script>
function toggle(id){
  let el = document.getElementById(id);

  // close all popups
  document.querySelectorAll('.popup').forEach(p => p.style.display = "none");

  // toggle clicked one
  el.style.display = "block";
}
</script>

</head>

<body>

<div class="header">
  <h1>🚀 AI Solutions Architect Roadmap</h1>
</div>

<div class="road">

<!-- CURVED ROAD -->
<svg viewBox="0 0 1000 400">
  <path d="M50 300 C200 100, 400 500, 650 200, 900 300"></path>
</svg>

<!-- STOP 1 -->
<div class="stop s1" onclick="toggle('p1')">
  <div class="popup" id="p1">
    <b>Python Basics</b><br>
    Learn programming fundamentals
    <br>
    #">Start</a>
  </div>
</div>

<!-- STOP 2 -->
<div class="stop s2" onclick="toggle('p2')">
  <div class="popup" id="p2">
    <b>Data Handling</b><br>
    Numpy & Pandas
    <br>
    #">Start</a>
  </div>
</div>

<!-- STOP 3 -->
<div class="stop s3" onclick="toggle('p3')">
  <div class="popup" id="p3">
    <b>Machine Learning</b><br>
    Models & evaluation
    <br>
    #">Start</a>
  </div>
</div>

<!-- STOP 4 -->
<div class="stop s4" onclick="toggle('p4')">
  <div class="popup" id="p4">
    <b>Deep Learning</b><br>
    Neural networks
    <br>
    #">Start</a>
  </div>
</div>

<!-- STOP 5 -->
<div class="stop s5" onclick="toggle('p5')">
  <div class="popup" id="p5">
    <b>Generative AI</b><br>
    LLMs, ChatGPT, RAG
    <br>
    #">Start</a>
  </div>
</div>

</div>

<div class="goal">
🎯 Final Destination → AI Solutions Architect
</div>

</body>
</html>
