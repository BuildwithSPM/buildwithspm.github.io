<style>

/* ROAD CONTAINER */
.road {
  position: relative;
  width: 80%;
  height: 400px;
  margin: 50px auto;
}

/* SVG ROAD */
svg {
  width: 100%;
  height: 100%;
}

/* STOPS */
.stop {
  position: absolute;
  width: 28px;
  height: 28px;
  background: #E4B36D;
  border-radius: 50%;
  border: 4px solid #4B4376;
  cursor: pointer;
  transition: 0.3s;
}

.stop:hover {
  transform: scale(1.2);
}

/* POSITIONS */
.s1 { top: 70%; left: 10%; }
.s2 { top: 40%; left: 30%; }
.s3 { top: 65%; left: 50%; }
.s4 { top: 30%; left: 70%; }
.s5 { top: 55%; left: 90%; }

/* POPUP CARD */
.popup {
  display: none;
  position: absolute;
  background: #4B4376;
  color: white;
  padding: 15px;
  border-radius: 15px;
  width: 150px;
  top: -90px;
  left: -50px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* GOAL */
.goal {
  text-align: center;
  font-size: 24px;
  color: #3A345B;
  margin-top: 20px;
}

</style>

<div class="road">

<!-- CURVED ROAD USING SVG -->
<svg>
  <path d="M50 300 C200 100, 400 500, 600 200, 800 300"
        stroke="#3A345B"
        stroke-width="20"
        fill="none"
        stroke-linecap="round"
        stroke-dasharray="10,10"/>
</svg>

<!-- STOP 1 -->
<div class="stop s1" onclick="toggle('p1')">
  <div class="popup" id="p1">Python Basics</div>
</div>

<!-- STOP 2 -->
<div class="stop s2" onclick="toggle('p2')">
  <div class="popup" id="p2">Data Handling</div>
</div>

<!-- STOP 3 -->
<div class="stop s3" onclick="toggle('p3')">
  <div class="popup" id="p3">Machine Learning</div>
</div>

<!-- STOP 4 -->
<div class="stop s4" onclick="toggle('p4')">
  <div class="popup" id="p4">Deep Learning</div>
</div>

<!-- STOP 5 -->
<div class="stop s5" onclick="toggle('p5')">
  <div class="popup" id="p5">Generative AI</div>
</div>

</div>

<div class="goal">
🎯 Final Destination → AI Solutions Architect
</div>

<script>
function toggle(id){
  let el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>
